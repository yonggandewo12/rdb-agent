<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书ChatID查询工具</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="root">
        <div class="header">
            <div class="header-content">
                <h1>飞书ChatID查询工具</h1>
            </div>
        </div>
        <div class="container">
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <div class="card-header">
                    <h2>通过Link Token获取ChatID</h2>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Link Token *</label>
                        <input type="text" id="link-token" required placeholder="请输入飞书Link Token" style="height: 48px; font-size: 16px;">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" id="btn-submit" style="width: 100%; height: 48px; font-size: 16px;">获取ChatID</button>
                    </div>
                    <div id="result-area" style="display: none; margin-top: 20px;">
                        <div class="form-group">
                            <label>查询结果</label>
                            <div class="card" style="background: #0f3460; padding: 16px;">
                                <div id="result-content" style="font-family: monospace; font-size: 14px; word-break: break-all;"></div>
                            </div>
                        </div>
                        <div class="form-group">
                            <button class="btn btn-secondary" id="btn-copy" style="width: 100%;">复制ChatID</button>
                        </div>
                    </div>
                    <div id="error-area" style="display: none; margin-top: 20px;">
                        <div class="alert alert-error" id="error-message"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/chat-id-tool.js"></script>
</body>
</html>
