<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞书ChatID查询工具</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="root">
        <div class="header">
            <div class="header-content">
                <h1>飞书ChatID查询工具</h1>
            </div>
        </div>
        <div class="container">
            <div class="card" style="max-width: 900px; margin: 0 auto;">
                <div class="card-header">
                    <h2>通过机器人可见群聊获取 Chat ID</h2>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <div class="alert alert-warning" style="margin-bottom: 16px;">
                            飞书官方不支持通过 Link Token 反查 Chat ID。本页面改为查询当前机器人可见的群聊列表。请先确保机器人已经在目标群中。
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="flex: 1;">
                            <label>群聊名称关键字</label>
                            <input type="text" id="keyword" placeholder="可选，输入群名关键字进行筛选" style="height: 48px; font-size: 16px;">
                        </div>
                        <div class="form-group" style="display: flex; align-items: end;">
                            <button class="btn btn-primary" id="btn-submit" style="width: 180px; height: 48px; font-size: 16px;">查询群聊列表</button>
                        </div>
                    </div>
                    <div id="result-area" style="display: none; margin-top: 20px;">
                        <div class="form-group">
                            <label>群聊列表</label>
                            <div class="card" style="background: #0f3460; padding: 16px;">
                                <div id="result-summary" style="margin-bottom: 12px; color: #ddd;"></div>
                                <div id="result-content"></div>
                            </div>
                        </div>
                    </div>
                    <div id="error-area" style="display: none; margin-top: 20px;">
                        <div class="alert alert-error" id="error-message"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/chat-id-tool.js"></script>
</body>
</html>
